# SonarCloud configuration
# https://sonarcloud.io — connect via GitHub OAuth, create project, copy the key below

# projectKey and organization are injected via GitHub secrets in ci.yml
# (SONAR_PROJECT_KEY, SONAR_ORGANIZATION)

# Source files
sonar.sources=app,components,lib,messages
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  out/**,\
  public/**

# Test files — kept in sonar.sources but classified as test code so Sonar
# applies test-specific rules and separates their issues from main code.
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions
# Next.js UI files (pages, layouts, error/loading boundaries) are pure rendering
# code with no branching logic — unit tests are not the right tool for these.
# React components in components/ are also UI-only.
# Thin API wrappers and proxy routes: no branching logic to unit-test.
sonar.coverage.exclusions=\
  app/**/page.tsx,\
  app/**/layout.tsx,\
  app/**/error.tsx,\
  app/**/loading.tsx,\
  app/**/not-found.tsx,\
  app/api/**,\
  components/**,\
  lib/api/clients/**,\
  lib/api/index.ts,\
  lib/api-client.ts

# Duplication exclusions
# Test files share repetitive describe/it/expect boilerplate by nature.
# API fetch clients share repetitive fetch/handleResponse patterns by nature.
# UI components share repetitive JSX structure by nature.
sonar.cpd.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  components/**,\
  app/**/page.tsx,\
  app/**/layout.tsx,\
  app/api/**,\
  lib/api/clients/**,\
  lib/api-client.ts
