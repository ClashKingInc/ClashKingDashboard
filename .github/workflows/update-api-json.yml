name: Update API JSON Reference

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Cruciaal voor het aanmaken van de PR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch API JSON
        run: |
          mkdir -p .github/api-reference
          curl -fsSL https://go.api.clashk.ing/openapi-private.json -o .github/api-reference/openapi-private.json

      - name: Validate JSON
        run: |
          if ! jq . .github/api-reference/openapi-private.json > /dev/null; then
            echo "Error: Downloaded file is not valid JSON"
            exit 1
          fi

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update api reference $(date +'%Y-%m-%d')"
          branch: docs/api-reference
          delete-branch: false # We houden de branch aan voor updates
          title: "Update API JSON Reference"
          body: |
            This is an automated update of the API JSON documentation.
            - Source: https://go.api.clashk.ing/openapi-private.json
            - Updated at: $(date)
          labels: |
            documentation
            automated-pr